// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    buildToolsVersion = "36.0.0"
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
    kotlinVersion = "2.3.0"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.google.gms:google-services:4.4.4'
    classpath('com.android.tools.build:gradle:8.7.3')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url = 'https://www.jitpack.io' }
  }

  // configurations.all {
  //   resolutionStrategy {
  //     force 'com.google.android.gms:play-services-ads:23.6.0'
  //     force 'com.google.android.gms:play-services-ads-lite:23.6.0'
  //     force 'com.google.android.gms:play-services-ads-base:23.6.0'
  //     force 'com.google.android.gms:play-services-ads-identifier:18.1.0'
  //   }
  // }
}

apply plugin: "com.facebook.react.rootproject"
