// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    buildToolsVersion = "34.0.0"
    minSdkVersion = 24
    compileSdkVersion = 34
    targetSdkVersion = 34
    kotlinVersion = "2.1.0" // Yeh version 25.4.0 AdMob SDK ke sath perfectly chalta hai
 }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.google.gms:google-services:4.4.4'
    classpath('com.android.tools.build:gradle:8.7.3')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url = 'https://www.jitpack.io' }
  }
}

apply plugin: "com.facebook.react.rootproject"
allprojects {
    configurations.all {
        resolutionStrategy {
            // Ads plugin ke liye version force karein
            force 'com.google.android.gms:play-services-ads:23.6.0'
            // Kotlin version ko project ke standard par lock karein
            force 'org.jetbrains.kotlin:kotlin-stdlib:2.1.0'
        }
    }
}