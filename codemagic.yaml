workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Set Kotlin Version and Build
        script: |
          # Gradle properties mein Kotlin version force karna
          echo "ext.kotlinVersion = '2.3.0'" >> android/gradle.properties
          
          # Android build directory saaf karna
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk