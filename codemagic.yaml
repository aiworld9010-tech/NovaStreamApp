workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Clean and Build
        script: |
          # Android build directory saaf karna
          rm -rf android/app/build
          
          # Build process
          cd android
          chmod +x gradlew
          
          # Gradle wrapper ko 8.7 par set karna taake version mismatch na ho
          ./gradlew wrapper --gradle-version 8.7
          
          ./gradlew clean
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk