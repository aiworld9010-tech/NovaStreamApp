workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
    scripts:
      environment:
      ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Install dependencies
        script: npm install
      - name: Build
        script: |
          rm -rf android/app/build
          cd android
          # AdMob SDK ke liye cache clear karna zaroori hai
          ./gradlew clean
          # --no-daemon lagane se aksar memory/plugin conflicts ruk jate hain
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk