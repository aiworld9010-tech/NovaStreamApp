workflows:
  android-debug:  
  ...
   name: Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build
        script: |
          cd android
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk