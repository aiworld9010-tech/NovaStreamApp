name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure SDK and Prebuild
        run: |
          rm -rf android
          npx expo prebuild --clean --platform android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
        env:
          # Expo build properties automatically picks up settings from app.json
          # Ye environment variable force karega ke SDK 36 hi use ho
          ORG_GRADLE_PROJECT_android_compileSdk: 36
          ORG_GRADLE_PROJECT_android_targetSdk: 36
          ORG_GRADLE_PROJECT_kotlinVersion: 2.3.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk