name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure SDK and Prebuild
        run: |
          rm -rf android
          npx expo prebuild --clean --platform android

      - name: Clear Gradle Cache
        run: |
          cd android
          ./gradlew --stop
          rm -rf ~/.gradle/caches

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
        env:
          ORG_GRADLE_PROJECT_android_compileSdk: 36
          ORG_GRADLE_PROJECT_android_targetSdk: 36
          # Dependencies 2.1.20 maang rahi hain, isliye yahan 2.1.20 dein
          ORG_GRADLE_PROJECT_kotlinVersion: 2.1.20
          ORG_GRADLE_PROJECT_android_kotlinVersion: 2.1.20
          ORG_GRADLE_PROJECT_hermesEnabled: "true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk