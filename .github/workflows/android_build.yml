name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure SDK and Prebuild
        run: |
          # Sabse pehle pura android folder uda do taake koi purani cache na rahe
          rm -rf android
          # Phir prebuild karo
          npx expo prebuild --clean --platform android
          npx expo install expo-build-properties
          
      - name: Cleanup Gradle Cache
        run: |
          rm -rf ~/.gradle/caches/

      - name: Build Android APK
        run: |
          cd android
          # Gradle ko force karo ke wo purani sab files bhool jaye
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
          -PcompileSdkVersion=36 \
          -PtargetSdkVersion=36 \
          -Pandroid.compileSdk=36 \
          -Pandroid.targetSdk=36
        env:
          ORG_GRADLE_PROJECT_android_compileSdk: 36
          ORG_GRADLE_PROJECT_android_targetSdk: 36

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk